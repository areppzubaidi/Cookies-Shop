name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      run: |
        cd terraform
        terraform init
    
    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve \
          -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
          -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
          -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
    
    - name: Get EC2 Public IP
      id: get_ip
      run: |
        cd terraform
        echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
    
    - name: Update Ansible Inventory
      run: |
        sed -i "s/<EC2_PUBLIC_IP>/${{ env.EC2_IP }}/g" ansible/inventory.ini
    
    - name: Run Ansible Playbook
      run: |
        ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
          --private-key ${{ secrets.SSH_PRIVATE_KEY }} \
          --extra-vars "github_repo=${{ github.server_url }}/${{ github.repository }}.git"
