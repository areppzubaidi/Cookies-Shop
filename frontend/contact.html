<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cookie Haven</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🍪 Cookie Haven</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="contact-section">
            <h1>Get In Touch</h1>
            <div class="contact-grid">
                <div class="contact-info">
                    <h2>Visit Us</h2>
                    <p>📍 123 Cookie Street<br>Singapore 123456</p>
                    
                    <h2>Call Us</h2>
                    <p>📞 +65 9123 4567</p>
                    
                    <h2>Email Us</h2>
                    <p>✉️ hello@cookiehaven.com</p>
                    
                    <h2>Hours</h2>
                    <p>🕒 Mon-Sat: 10am - 8pm<br>Sunday: Closed</p>
                </div>
                
                <div class="contact-form">
                    <h2>Send us a message</h2>
                    <form id="contactForm">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                        <textarea rows="5" placeholder="Your Message" required></textarea>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                    <div id="formMessage" class="form-message"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Cookie Haven. All rights reserved. 🍪 Made with love</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
